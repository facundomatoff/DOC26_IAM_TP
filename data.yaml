# data.yaml

# 'path' apunta a la ruta raíz del repositorio clonado en Colab.
# Al clonar un repo, se debe ubicar la carpeta en la ruta: /content/DOC26_IAM_TP
path: /content/DOC26_IAM_TP

# La carpeta 'datasets' posee todas las imagenes y etiquetas (labels)
# Se crearon 3 archivos con los IDs de las imagenes que serán utilizadas para: Entrenamiento, Validación y Testeo.
# Estos archivos permiten formatear la distribución de las imágenes y los porcentajes de distribución.
# El modelo busca en la 'ruta' la información para ser reentranado.

# Dentro de los archivos, se encuentra la carpeta 'dataset_split' con los .txt con la lista de imágenes
train: dataset_split/train.txt
val: dataset_split/val.txt
test: dataset_split/test.txt

# Clases
nc: 5
names:
  0: pepsi_bottle
  1: water_bottle
  2: generic_bottle
  3: aluminum_can
  4: unknown
